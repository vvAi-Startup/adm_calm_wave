name: Ping Render Backend Health

on:
  schedule:
    # Executa a cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite execução manual caso necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health route
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" https://calm-wave-backend.onrender.com/health || echo "Serviço pode estar indisponível, mas o ping foi enviado."
