name: Security Audit

on:
  schedule:
    # Roda a cada 3 dias à meia-noite
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  security-scan:
    name: Verificação de Vulnerabilidades
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Verificar vulnerabilidades no Back-end (Python)
        working-directory: ./back-end
        # pip-audit vai ler o requirements.txt e checar contra o banco de dados de vulnerabilidades (CVEs)
        run: pip-audit -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar vulnerabilidades no Front-end (Node.js)
        working-directory: ./web
        # npm audit vai checar as dependências do painel e falhar se houver vulnerabilidade de nível alto/crítico
        run: npm audit --audit-level=high
