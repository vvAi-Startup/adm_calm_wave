name: CI/CD Pipeline para o Render

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./back-end
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Pytest
        working-directory: ./back-end
        run: |
          pytest tests/

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Disparando deploy no Render..."
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "A URL de Deploy do Render nao foi configurada nas variaveis (Secrets) do GitHub."
            exit 1
          fi
          curl -X POST "$DEPLOY_HOOK"
